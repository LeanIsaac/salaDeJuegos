<header>
  <div class="logo">
     <img class="logo-icon" src="iconSalaDeJuegos.png" alt="Logo" width="30" height="30">
    <a class="logo-text" routerLink="" >Sala de <span>Juegos</span></a>
  </div>
  <nav>

    @if (this.authService.usuarioActual()) {
      <button routerLink="" routerLinkActive="active-link">Home</button>
      <button routerLink="encuesta" routerLinkActive="active-link">Encuesta</button>
      <button routerLink="resultados" routerLinkActive="active-link">Resultados</button>
      <button routerLink="chat" routerLinkActive="active-link">Chat</button>
      <p class="user-name">▶ {{ this.authService.usuarioActual()?.user_metadata?.['nombre'] }}</p>
      @if (this.authService.esAdmin()) {
        <button routerLink="resultados-encuesta" routerLinkActive="active-link">Admin</button>
      }
      <button class="btn-cerrarSesion" (click)="this.authService.cerrarSesion()">Cerrar sesión</button>
    } @else {
      <button routerLink="" routerLinkActive="active-link">Home</button>
      <button routerLink="login" routerLinkActive="active-link">Login</button>
      <button routerLink="registro" routerLinkActive="active-link">Registro</button>
      <button routerLink="quienSoy" routerLinkActive="active-link">Quién Soy</button>
    }
  </nav>
</header>
<router-outlet />
