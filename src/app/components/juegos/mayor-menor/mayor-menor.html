<div class="page">
  <div class="inner">

    <div class="header">
      <div class="tag">Juego de cartas</div>
      <h1>🃏 Mayor o Menor</h1>
    </div>

    <div class="puntaje-bar">
      <span class="puntaje-label">Puntaje</span>
      <span class="puntaje-num">{{ puntaje }}</span>
    </div>

    <div class="cartas-row">
      <div class="carta carta-actual">
        <span class="carta-valor">{{ cartaActual }}</span>
      </div>
      <span class="vs">VS</span>
      <div class="carta carta-siguiente">
        @if (this.revelando()) {
          <span class="carta-valor">{{ cartaSiguiente }}</span>
        } @else {
          <span class="carta-valor">?</span>
        }
      </div>
    </div>

    <div class="btns">
      <button class="btn-mayor" type="button" (click)="adivinarCarta('mayor')" [disabled]="!juegoActivo || revelando()">
        ▲ Mayor
      </button>
      <button class="btn-menor" type="button" (click)="adivinarCarta('menor')" [disabled]="!juegoActivo || revelando()">
        ▼ Menor
      </button>
    </div>

    @if(mensaje) {
      <div class="mensaje" [class.correcto]="juegoActivo" [class.incorrecto]="!juegoActivo">
        {{ mensaje }}
      </div>
    }

    <button type="button" class="btn-reiniciar" (click)="reiniciarJuego()">↺ Reiniciar</button>

  </div>
</div>
