<div class="page">
  <div class="card">
    <div class="tag">Nuevo jugador</div>
    <h1>Crear Cuenta</h1>
    <p class="subtitle">// Completá tus datos para unirte</p>

    <form [formGroup]="formulario" (ngSubmit)="accion()">
      <div class="field">
        <label>Nombre</label>
        <input type="text" formControlName="nombre" placeholder="Tu nombre">
      </div>

      <div class="field">
        <label>Apellido</label>
        <input type="text" formControlName="apellido" placeholder="Tu apellido">
      </div>

      <div class="field">
        <label>Edad</label>
        <input type="number" formControlName="edad" placeholder="Tu edad">
      </div>

      <div class="divider"><span>credenciales</span></div>

      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="tu@email.com">
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="••••••••">
      </div>

      <button [disabled]="!formulario.valid" type="submit">▶ Crear cuenta</button>
    </form>

    <p class="link">¿Ya tenés cuenta? <a routerLink="/login">Iniciá sesión</a></p>
  </div>
</div>
